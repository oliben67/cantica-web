# https://taskfile.dev  —  requires Task ≥ 3.28
version: '3'

# ── Default ────────────────────────────────────────────────────────────────
tasks:
  default:
    desc: List all available tasks
    silent: true
    cmd: task --list

  # ── Setup ─────────────────────────────────────────────────────────────────
  install:
    desc: Install frontend npm dependencies
    cmd: npm install

  # ── Development ───────────────────────────────────────────────────────────
  dev:
    desc: Start the Vite dev server (proxies /v1 to FastAPI at :8042)
    cmd: npm run dev

  preview:
    desc: Preview the production build locally
    cmd: npm run preview

  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    desc: Build the frontend for production (outputs to dist/)
    cmd: npm run build

  # ── Type checking ─────────────────────────────────────────────────────────
  typecheck:
    desc: Run tsc --noEmit across the project references
    cmd: npm run typecheck

  # ── Testing ───────────────────────────────────────────────────────────────
  test:
    desc: Run the Vitest test suite
    cmd: npm test

  test:watch:
    desc: Run Vitest in watch mode for quick iteration
    interactive: true
    cmd: npm run test:watch

  # ── Linting ───────────────────────────────────────────────────────────────
  lint:
    desc: Run ESLint over the source tree
    cmd: npm run lint

  lint:fix:
    desc: Run ESLint and auto-fix all fixable issues
    cmd: npm run lint -- --fix

  # ── Combined workflows ────────────────────────────────────────────────────
  fix:
    desc: Auto-fix all ESLint issues
    cmds:
      - task: lint:fix

  check:
    desc: Run all quality gates — typecheck, lint, test, then build
    cmds:
      - task: typecheck
      - task: lint
      - task: test
      - task: build

  ci:
    desc: Full CI pipeline — frozen install → typecheck → lint → test → build
    cmds:
      - task: install
      - task: typecheck
      - task: lint
      - task: test
      - task: build

  # ── Clean ─────────────────────────────────────────────────────────────────
  clean:
    desc: Remove build artefacts and caches
    silent: true
    cmd: |
      rm -rf dist/
      rm -rf node_modules/.vite
      printf '\033[32m✓ Clean\033[0m\n'

  clean:all:
    desc: Remove everything including node_modules (run task install to restore)
    cmds:
      - task: clean
      - cmd: rm -rf node_modules/
        silent: true
      - cmd: printf '\033[32m✓ Fully clean\033[0m\n'
        silent: true
